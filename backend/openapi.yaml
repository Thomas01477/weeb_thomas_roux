openapi: 3.0.3
info:
  title: Weeb API
  description: >
    API REST de l'application Weeb (backend Django + DRF).
    Brouillon généré en complément du document 05_api_endpoints.md.
  version: "1.0.0"
servers:
  - url: http://localhost:8000
    description: Développement local
  - url: https://weeb-backend.onrender.com
    description: Production (Render)

tags:
  - name: articles
  - name: categories
  - name: contact
  - name: auth

paths:
  /api/articles/:
    get:
      tags: [articles]
      summary: Lister les articles (paginé, filtrable)
      security: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Filtre sur title ou content (icontains)
        - name: author
          in: query
          schema: { type: string }
          description: "Filtre par auteur (icontains), ou 'me' pour l'utilisateur connecté"
        - name: category
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Liste paginée d'articles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedArticles"
    post:
      tags: [articles]
      summary: Créer un article
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Article créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Compte non actif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/articles/{id}/:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      tags: [articles]
      summary: Récupérer un article
      security: []
      responses:
        "200":
          description: Détail de l'article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [articles]
      summary: Modifier un article (propriétaire ou admin)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticlePartialInput"
      responses:
        "200":
          description: Article mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [articles]
      summary: Supprimer un article (propriétaire ou admin)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Article supprimé
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/articles/mine/:
    get:
      tags: [articles]
      summary: Lister les articles du compte connecté
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste (non paginée) des articles de l'utilisateur
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/categories/:
    get:
      tags: [categories]
      summary: Lister les catégories
      security: []
      responses:
        "200":
          description: Liste des catégories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /api/contact/:
    post:
      tags: [contact]
      summary: Envoyer un message de contact
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactMessageInput"
      responses:
        "201":
          description: Message enregistré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
        "400":
          $ref: "#/components/responses/BadRequest"
    get:
      tags: [contact]
      summary: Lister les messages de contact (admin uniquement)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Liste des messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactMessage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/auth/register/:
    post:
      tags: [auth]
      summary: Créer un compte (inactif par défaut)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Compte créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterOutput"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/auth/login/:
    post:
      tags: [auth]
      summary: Connexion, retourne les tokens JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginOutput"
        "401":
          description: Email inconnu ou mot de passe incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Compte non actif
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/token/refresh/:
    post:
      tags: [auth]
      summary: Rafraîchir l'access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "200":
          description: Nouvel access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access: { type: string }
        "401":
          description: Refresh token invalide ou expiré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/profile/:
    get:
      tags: [auth]
      summary: Récupérer le profil du compte connecté
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [auth]
      summary: Modifier le profil du compte connecté
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilePartialInput"
      responses:
        "200":
          description: Profil mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Payload invalide
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentification requise ou identifiants invalides
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Permissions insuffisantes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Ressource inexistante
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        detail:
          type: string

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }

    Article:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        content: { type: string }
        author: { type: string }
        owner:
          type: integer
          nullable: true
          description: id du CustomUser propriétaire
        category:
          type: integer
          nullable: true
        category_name:
          type: string
          nullable: true
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ArticleInput:
      type: object
      required: [title, content]
      properties:
        title: { type: string }
        content: { type: string }
        category:
          type: integer
          nullable: true

    ArticlePartialInput:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        category:
          type: integer
          nullable: true

    PaginatedArticles:
      type: object
      properties:
        count: { type: integer }
        next: { type: string, nullable: true, format: uri }
        previous: { type: string, nullable: true, format: uri }
        results:
          type: array
          items:
            $ref: "#/components/schemas/Article"

    ContactMessage:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        message: { type: string }
        created_at: { type: string, format: date-time }
        satisfaction:
          type: integer
          nullable: true
          readOnly: true

    ContactMessageInput:
      type: object
      required: [name, email, message]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        message: { type: string }

    RegisterInput:
      type: object
      required: [first_name, last_name, email, password]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }

    RegisterOutput:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        is_active:
          type: boolean
          description: Toujours false à la création

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    LoginOutput:
      type: object
      properties:
        access: { type: string }
        refresh: { type: string }
        user:
          type: object
          properties:
            id: { type: integer }
            email: { type: string, format: email }
            first_name: { type: string }
            last_name: { type: string }
            is_staff: { type: boolean }

    Profile:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        is_active: { type: boolean }
        is_staff: { type: boolean }

    ProfilePartialInput:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
